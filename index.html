<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Nos vamos de viaje ✈️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --c1: #ff6b35; --c2: #b060ff; --c3: #3dd6f5; --c4: #3dffa0;
      --bg: #06040f; --text: #f1f5f9; --muted: rgba(241,245,249,0.5);
      --cbg: rgba(255,255,255,0.05); --cborder: rgba(255,255,255,0.1);
      --r: 20px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      min-height: 100svh; font-family: 'DM Sans', sans-serif; color: var(--text);
      overflow-x: hidden; display: flex; align-items: center; justify-content: center;
      padding: 2rem 1.1rem 3rem; background: var(--bg);
      -webkit-tap-highlight-color: transparent;
    }

    #sky { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .aurora { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .ab {
      position: absolute; left: -20%; width: 140%; border-radius: 50%;
      filter: blur(60px); opacity: 0;
      animation: aPulse var(--d) var(--dl) ease-in-out infinite alternate;
    }
    .ab:nth-child(1) { height: 260px; top: -80px; background: linear-gradient(180deg, rgba(176,96,255,0.2) 0%, transparent 100%); --d:10s; --dl:0s; }
    .ab:nth-child(2) { height: 200px; top: 20px;  background: linear-gradient(180deg, rgba(61,214,245,0.13) 0%, transparent 100%); --d:14s; --dl:-4s; }
    .ab:nth-child(3) { height: 160px; top: 0;     background: linear-gradient(180deg, rgba(61,255,160,0.08) 0%, transparent 100%); --d:8s;  --dl:-2s; }
    @keyframes aPulse { from { opacity: 0.25; transform: scaleX(1) translateY(0); } to { opacity: 0.75; transform: scaleX(1.1) translateY(20px); } }

    .nlayer { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .nb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0; animation: nP var(--d) var(--dl) ease-in-out infinite alternate; }
    .nb1 { width:70vw; height:55vw; top:-15vw; left:-20vw; background: radial-gradient(ellipse, rgba(176,96,255,0.22) 0%, transparent 70%); --d:11s; --dl:0s; }
    .nb2 { width:65vw; height:65vw; bottom:-15vw; right:-20vw; background: radial-gradient(ellipse, rgba(61,214,245,0.18) 0%, transparent 70%); --d:13s; --dl:-4s; }
    .nb3 { width:50vw; height:40vw; top:45%; left:25%; background: radial-gradient(ellipse, rgba(255,107,53,0.1) 0%, transparent 70%); --d:9s; --dl:-6s; }
    @keyframes nP { from { opacity: 0.25; transform: scale(1); } to { opacity: 0.65; transform: scale(1.12) translateY(-15px); } }

    .wrapper { position: relative; z-index: 1; width: 100%; max-width: 480px; text-align: center; }

    .badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.38rem 1.1rem; border: 1px solid rgba(255,255,255,0.12); border-radius: 99px;
      font-size: 0.7rem; font-weight: 500; letter-spacing: 0.13em; text-transform: uppercase;
      color: var(--muted); background: rgba(255,255,255,0.04); backdrop-filter: blur(12px);
      margin-bottom: 1.6rem; animation: fadeUp 0.9s 0.1s ease both;
    }
    .bdot { width: 7px; height: 7px; border-radius: 50%; background: var(--c4); box-shadow: 0 0 8px var(--c4); animation: bdPulse 2s ease-in-out infinite; }
    @keyframes bdPulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } }

    .plane-hero {
      font-size: clamp(3.2rem, 14vw, 5rem); display: inline-block;
      animation: planeIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.3s both, planeDrift 4s ease-in-out 1.5s infinite;
      filter: drop-shadow(0 0 28px rgba(255,107,53,0.85));
    }
    @keyframes planeIn { from { transform: translateX(-120vw) rotate(-12deg); opacity: 0; } to { transform: none; opacity: 1; } }
    @keyframes planeDrift { 0%,100% { transform: translateY(0) rotate(0deg); } 30% { transform: translateY(-10px) rotate(3deg); } 70% { transform: translateY(7px) rotate(-2deg); } }

    .title {
      font-family: 'Playfair Display', serif; font-size: clamp(2.2rem, 9vw, 4rem);
      font-weight: 900; line-height: 1.1; margin-top: 0.6rem;
      background: linear-gradient(110deg, #ff6b35 0%, #b060ff 45%, #3dd6f5 75%, #ff6b35 100%);
      background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; animation: fadeUp 0.9s 0.4s ease both, gradShift 5s linear 1.5s infinite;
    }
    @keyframes gradShift { from { background-position: 0% center; } to { background-position: 200% center; } }

    .subtitle { margin-top: 0.9rem; font-size: clamp(0.88rem, 3.5vw, 1.05rem); font-weight: 300; color: var(--muted); animation: fadeUp 0.9s 0.55s ease both; }

    .divider { margin: 1.8rem auto; position: relative; width: 100px; height: 2px; animation: fadeUp 0.9s 0.65s ease both; }
    .divider::before { content: ''; position: absolute; inset: 0; border-radius: 99px; background: linear-gradient(90deg, var(--c1), var(--c2), var(--c3)); }
    .divider::after  { content: ''; position: absolute; inset: 0; border-radius: 99px; background: linear-gradient(90deg, var(--c1), var(--c2), var(--c3)); filter: blur(6px); animation: gPulse 2s ease-in-out infinite; }
    @keyframes gPulse { 0%,100% { opacity: 0.3; } 50% { opacity: 0.9; } }

    .progress-wrap { margin: 0 auto 2rem; animation: fadeUp 0.9s 0.7s ease both; }
    .progress-labels { display: flex; justify-content: space-between; align-items: center; font-size: 0.65rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.55rem; }
    .progress-pct { color: var(--c3); font-size: 0.72rem; font-weight: 600; }
    .progress-bar-outer { height: 7px; background: rgba(255,255,255,0.07); border-radius: 99px; overflow: hidden; }
    .progress-bar-inner { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--c1), var(--c2), var(--c3)); transition: width 1s ease; position: relative; }
    .progress-bar-inner::after { content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 50px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.55)); animation: shimmer 1.8s ease-in-out infinite; }
    @keyframes shimmer { 0%,100% { opacity: 0; } 50% { opacity: 1; } }

    .countdown-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; animation: fadeUp 0.9s 0.8s ease both; }

    .card {
      background: var(--cbg); border: 1px solid var(--cborder); border-radius: var(--r);
      overflow: hidden; position: relative; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 8px 40px rgba(0,0,0,0.55); transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .card.tap { transform: scale(0.94); box-shadow: 0 2px 16px rgba(0,0,0,0.4), 0 0 0 2px var(--ca); }
    .card::before { content: ''; position: absolute; top: 0; left: 8%; right: 8%; height: 1px; z-index: 1; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); }
    .card::after  { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: var(--ca, rgba(255,255,255,0.2)); box-shadow: 0 0 14px var(--ca, transparent); border-radius: 0 0 var(--r) var(--r); }
    .card:nth-child(1) { --ca: #ff6b35; }
    .card:nth-child(2) { --ca: #b060ff; }
    .card:nth-child(3) { --ca: #3dd6f5; }
    .card:nth-child(4) { --ca: #3dffa0; }

    .flip-clock { padding: 1.6rem 0.8rem 1.3rem; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 1; }
    .flip-line { position: absolute; left: 10%; right: 10%; height: 1px; background: rgba(0,0,0,0.35); top: calc(50% - 0.5rem); z-index: 2; }

    .number {
      font-family: 'Playfair Display', serif; font-weight: 700;
      font-size: clamp(3rem, 12vw, 4.8rem); line-height: 1; color: #fff;
      text-shadow: 0 0 35px color-mix(in srgb, var(--ca, white) 80%, transparent), 0 2px 8px rgba(0,0,0,0.6);
      display: block; perspective: 400px;
    }
    .number.flip-out { animation: fOut 0.17s ease-in forwards; }
    .number.flip-in  { animation: fIn  0.22s ease-out forwards; }
    @keyframes fOut { from { transform: rotateX(0deg);   opacity: 1; } to { transform: rotateX(-90deg); opacity: 0; } }
    @keyframes fIn  { from { transform: rotateX(90deg);  opacity: 0; } to { transform: rotateX(0deg);   opacity: 1; } }

    .label { display: block; margin-top: 0.5rem; font-size: 0.65rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ca, rgba(255,255,255,0.5)); opacity: 0.9; position: relative; z-index: 1; }

    .bwrap { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 3; }
    .bp { position: absolute; width: 5px; height: 5px; border-radius: 50%; animation: bpA 0.55s ease-out forwards; }
    @keyframes bpA { from { transform: translate(0,0) scale(1); opacity: 1; } to { transform: translate(var(--bx), var(--by)) scale(0); opacity: 0; } }

    .destination { margin-top: 2.2rem; font-size: clamp(1.5rem, 7vw, 2.2rem); letter-spacing: 0.15em; animation: fadeUp 0.9s 1s ease both; }
    .destination span { display: inline-block; animation: eFloat var(--ef) var(--ed) ease-in-out infinite alternate; }
    .destination span:nth-child(1) { --ef:3.2s; --ed:0s; }
    .destination span:nth-child(2) { --ef:2.8s; --ed:-0.8s; }
    .destination span:nth-child(3) { --ef:3.5s; --ed:-1.5s; }
    .destination span:nth-child(4) { --ef:2.6s; --ed:-0.3s; }
    .destination span:nth-child(5) { --ef:3.1s; --ed:-1.1s; }
    @keyframes eFloat { from { transform: translateY(0) rotate(-3deg); } to { transform: translateY(-8px) rotate(3deg); } }

    .target-date { margin-top: 1.1rem; font-size: 0.82rem; color: var(--muted); letter-spacing: 0.07em; animation: fadeUp 0.9s 1.1s ease both; }
    .target-date strong { color: rgba(255,255,255,0.8); }

    #arrival-screen { display: none; position: fixed; inset: 0; z-index: 100; background: radial-gradient(ellipse at center, #180330 0%, #06040f 70%); align-items: center; justify-content: center; flex-direction: column; text-align: center; padding: 2rem; }
    #arrival-screen.active { display: flex; animation: fadeIn 1.2s ease both; }
    .arrival-emoji { font-size: 5rem; animation: pop 0.8s 0.4s cubic-bezier(0.34,1.56,0.64,1) both, planeDrift 3s 1.2s ease-in-out infinite; }
    .arrival-title { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 10vw, 5rem); font-weight: 900; margin-top: 1.5rem; background: linear-gradient(110deg, #ff6b35, #b060ff, #3dd6f5); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: fadeUp 1s 0.6s ease both, gradShift 4s linear infinite; }
    .arrival-sub { margin-top: 1rem; font-size: clamp(1rem, 4vw, 1.4rem); color: var(--muted); animation: fadeUp 1s 0.9s ease both; }
    .confetti-piece { position: absolute; opacity: 0; animation: cFall linear forwards; }
    @keyframes cFall { 0% { transform: translateY(-30px) rotate(0deg) scale(1); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg) scale(0.4); opacity: 0; } }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to   { opacity: 1; } }
    @keyframes pop    { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    @supports (padding: max(0px)) { body { padding-bottom: max(3rem, env(safe-area-inset-bottom)); } }
  </style>
</head>
<body>

  <div class="aurora"><div class="ab"></div><div class="ab"></div><div class="ab"></div></div>
  <div class="nlayer"><div class="nb nb1"></div><div class="nb nb2"></div><div class="nb nb3"></div></div>
  <canvas id="sky"></canvas>

  <div class="wrapper" id="wrapper" role="main">

    <div class="badge"><span class="bdot"></span>Cuenta regresiva activa</div>
    <div class="plane-hero" aria-hidden="true">✈️</div>
    <h1 class="title">Nos vamos de viaje</h1>
    <p class="subtitle">Falta muy poco para nuestra aventura en familia ❤️</p>
    <div class="divider" aria-hidden="true"></div>

    <div class="progress-wrap">
      <div class="progress-labels">
        <span>Inicio</span>
        <span class="progress-pct" id="progress-pct">0%</span>
        <span>7 de Abril</span>
      </div>
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="progress-bar" style="width:0%"></div>
      </div>
    </div>

    <div class="countdown-grid" aria-live="polite">
      <div class="card"><div class="flip-clock"><div class="flip-line"></div><span class="number" id="days">00</span><span class="label">Días</span></div><div class="bwrap" id="bw0"></div></div>
      <div class="card"><div class="flip-clock"><div class="flip-line"></div><span class="number" id="hours">00</span><span class="label">Horas</span></div><div class="bwrap" id="bw1"></div></div>
      <div class="card"><div class="flip-clock"><div class="flip-line"></div><span class="number" id="minutes">00</span><span class="label">Minutos</span></div><div class="bwrap" id="bw2"></div></div>
      <div class="card"><div class="flip-clock"><div class="flip-line"></div><span class="number" id="seconds">00</span><span class="label">Segundos</span></div><div class="bwrap" id="bw3"></div></div>
    </div>

    <div class="destination" aria-hidden="true">
      <span>🌍</span><span>🗺️</span><span>🧳</span><span>🌅</span><span>📸</span>
    </div>
    <p class="target-date"><strong>7 de abril de 2026 a las 9:00 hs</strong> · ¡Despegamos!</p>
  </div>

  <div id="arrival-screen" role="alert" aria-live="assertive">
    <div class="arrival-emoji">🎉</div>
    <h2 class="arrival-title">¡Llegó el día!</h2>
    <p class="arrival-sub">Es hora de vivir esa aventura en familia que tanto esperaron 🌍❤️✈️</p>
  </div>

  <script>
  /* ── CANVAS: ESTRELLAS + AVIONES REALES + METEOROS ── */
  (function() {
    const cv  = document.getElementById('sky');
    const ctx = cv.getContext('2d');
    let W, H;

    function resize() { W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    /* ESTRELLAS */
    const SC = ['#ffffff','#ffe8d6','#d6eaff','#b060ff','#3dd6f5'];
    const stars = Array.from({length: 200}, () => ({
      x: Math.random(), y: Math.random(),
      r: Math.random()*1.4+0.2, a: Math.random(),
      da: (Math.random()-0.5)*0.005,
      vx: (Math.random()-0.5)*0.00006,
      vy: (Math.random()-0.5)*0.00006,
      col: SC[Math.floor(Math.random()*SC.length)]
    }));

    /* AVIONES */
    const PC = [
      { body: '#ffffff',  trail: 'rgba(255,255,255,' },
      { body: '#ffd6a0',  trail: 'rgba(255,180,80,'  },
      { body: '#a0d8ff',  trail: 'rgba(80,190,255,'  },
      { body: '#d0b0ff',  trail: 'rgba(180,100,255,' },
    ];

    class Plane {
      constructor(delay) {
        this.active = false; this.trail = [];
        this.col = PC[0];
        setTimeout(() => this.spawn(true), delay);
      }
      spawn(initial) {
        this.active = true;
        this.trail  = [];
        this.col    = PC[Math.floor(Math.random()*PC.length)];
        this.y0     = H * (0.03 + Math.random()*0.55);
        this.x      = initial ? (Math.random()*W*0.8) : -60;
        this.amp    = 14 + Math.random()*40;
        this.freq   = 0.0007 + Math.random()*0.0013;
        this.phase  = Math.random()*Math.PI*2;
        this.spd    = 1.4 + Math.random()*2.4;
        this.scale  = 0.65 + Math.random()*0.75;
        this.opa    = initial ? 1 : 0;
        this._next  = 13000 + Math.random()*22000;
      }
      update() {
        if (!this.active) return;
        this.x  += this.spd;
        this.opa = Math.min(1, this.opa+0.018);
        const y  = this.y0 + Math.sin(this.x*this.freq + this.phase)*this.amp;
        this.trail.push({x: this.x, y});
        if (this.trail.length > 90) this.trail.shift();
        if (this.x > W+80) { this.active=false; setTimeout(()=>this.spawn(false), this._next); }
      }
      draw() {
        if (!this.active || this.trail.length < 2) return;
        const n = this.trail.length;
        const last = this.trail[n-1];
        const prev = this.trail[n-2];
        const ang  = Math.atan2(last.y-prev.y, last.x-prev.x);

        /* estela */
        for (let i=1; i<n; i++) {
          const p0 = this.trail[i-1], p1 = this.trail[i];
          const t  = i/n;
          ctx.beginPath(); ctx.moveTo(p0.x,p0.y); ctx.lineTo(p1.x,p1.y);
          ctx.strokeStyle = this.col.trail + (t*0.35*this.opa) + ')';
          ctx.lineWidth   = t*3.2*this.scale;
          ctx.lineCap     = 'round'; ctx.stroke();
        }

        /* avión */
        ctx.save();
        ctx.translate(last.x, last.y);
        ctx.rotate(ang);
        ctx.globalAlpha = this.opa;
        ctx.scale(this.scale, this.scale);
        const s = 15;

        // Cuerpo principal
        ctx.beginPath();
        ctx.moveTo(s, 0);
        ctx.lineTo(-s*0.55, -s*0.28);
        ctx.lineTo(-s*0.82, 0);
        ctx.lineTo(-s*0.55, s*0.28);
        ctx.closePath();
        ctx.fillStyle = this.col.body; ctx.fill();

        // Ala izquierda
        ctx.beginPath();
        ctx.moveTo(-s*0.05, 0); ctx.lineTo(-s*0.42, -s*0.9);
        ctx.lineTo(-s*0.62, -s*0.82); ctx.lineTo(-s*0.52, 0);
        ctx.closePath(); ctx.fill();

        // Ala derecha
        ctx.beginPath();
        ctx.moveTo(-s*0.05, 0); ctx.lineTo(-s*0.42, s*0.9);
        ctx.lineTo(-s*0.62, s*0.82); ctx.lineTo(-s*0.52, 0);
        ctx.closePath(); ctx.fill();

        // Cola
        ctx.beginPath();
        ctx.moveTo(-s*0.52, 0); ctx.lineTo(-s*0.78, -s*0.5);
        ctx.lineTo(-s*0.85, -s*0.35); ctx.lineTo(-s*0.65, 0);
        ctx.closePath(); ctx.globalAlpha = this.opa*0.85; ctx.fill();

        // Ventanillas
        ctx.globalAlpha = this.opa*0.55;
        ctx.fillStyle = '#aaeeff';
        for (let w=0; w<4; w++) {
          ctx.beginPath();
          ctx.arc(s*0.35 - w*s*0.28, -s*0.09, 1.6, 0, Math.PI*2);
          ctx.fill();
        }

        ctx.restore(); ctx.globalAlpha = 1;
      }
    }

    const planes = [
      new Plane(1600),
      new Plane(10000),
      new Plane(19000),
      new Plane(28000),
    ];

    /* METEOROS */
    class Meteor {
      constructor() { this.active=false; this.sched(); }
      sched() { setTimeout(()=>this.fire(), 3000+Math.random()*20000); }
      fire() {
        this.active=true;
        this.x=Math.random()*W*0.75; this.y=Math.random()*H*0.3;
        this.vx=4+Math.random()*8; this.vy=2+Math.random()*4;
        this.len=55+Math.random()*90; this.life=1;
      }
      update() {
        if (!this.active) return;
        this.x+=this.vx; this.y+=this.vy; this.life-=0.04;
        if (this.life<=0) { this.active=false; this.sched(); }
      }
      draw() {
        if (!this.active) return;
        const r = this.len/this.vx;
        const tx = this.x-this.vx*r, ty = this.y-this.vy*r;
        const g = ctx.createLinearGradient(tx,ty,this.x,this.y);
        g.addColorStop(0,'rgba(255,255,255,0)');
        g.addColorStop(1,`rgba(255,255,255,${this.life*0.85})`);
        ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(this.x,this.y);
        ctx.strokeStyle=g; ctx.lineWidth=2; ctx.stroke();
        ctx.beginPath(); ctx.arc(this.x,this.y,2.5,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,${this.life})`; ctx.fill();
      }
    }

    const meteors = [new Meteor(), new Meteor(), new Meteor()];

    function loop() {
      ctx.clearRect(0,0,W,H);
      const bg = ctx.createLinearGradient(0,0,W,H);
      bg.addColorStop(0,'#06040f'); bg.addColorStop(0.5,'#0d0a1e'); bg.addColorStop(1,'#130f2a');
      ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

      stars.forEach(s=>{
        s.a+=s.da; if(s.a<=0.08||s.a>=1) s.da=-s.da;
        s.x+=s.vx; s.y+=s.vy;
        if(s.x<0)s.x=1; if(s.x>1)s.x=0; if(s.y<0)s.y=1; if(s.y>1)s.y=0;
        ctx.beginPath(); ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
        ctx.fillStyle=s.col; ctx.globalAlpha=Math.abs(s.a); ctx.fill();
      });
      ctx.globalAlpha=1;

      meteors.forEach(m=>{ m.update(); m.draw(); });
      planes.forEach(p=>{ p.update(); p.draw(); });
      requestAnimationFrame(loop);
    }
    loop();
  })();


  /* ── PARALLAX GIROSCOPIO (mobile) ── */
  (function(){
    const wrapper = document.getElementById('wrapper');
    function applyTilt(beta, gamma) {
      const tx = Math.max(-15, Math.min(15, gamma*0.4));
      const ty = Math.max(-8,  Math.min(8,  (beta-30)*0.15));
      wrapper.style.transform = `translate(${tx}px,${ty}px)`;
    }
    function startGyro(){
      window.addEventListener('deviceorientation', e => {
        if (e.gamma !== null) applyTilt(e.beta, e.gamma);
      });
    }
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      document.addEventListener('touchstart', function ask(){
        document.removeEventListener('touchstart', ask);
        DeviceOrientationEvent.requestPermission().then(r=>{ if(r==='granted') startGyro(); }).catch(()=>{});
      }, {once:true});
    } else {
      startGyro();
    }
  })();


  /* ── TAP FEEDBACK MOBILE ── */
  document.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('touchstart', ()=>card.classList.add('tap'),    {passive:true});
    card.addEventListener('touchend',   ()=>card.classList.remove('tap'), {passive:true});
    card.addEventListener('touchcancel',()=>card.classList.remove('tap'), {passive:true});
  });


  /* ── COUNTDOWN ── */
  (function(){
    const TARGET = new Date('2026-04-07T09:00:00');
    const START  = new Date('2026-01-01T00:00:00');

    const elD=document.getElementById('days'), elH=document.getElementById('hours'),
          elM=document.getElementById('minutes'), elS=document.getElementById('seconds');
    const bar=document.getElementById('progress-bar'), pctEl=document.getElementById('progress-pct');
    const ACC=['#ff6b35','#b060ff','#3dd6f5','#3dffa0'];

    function pad(n){ return String(n).padStart(2,'0'); }

    function flipEl(el, val, idx){
      if (el.textContent===val) return;
      el.classList.remove('flip-in','flip-out'); void el.offsetWidth; el.classList.add('flip-out');
      setTimeout(()=>{
        el.textContent=val;
        el.classList.remove('flip-out'); void el.offsetWidth; el.classList.add('flip-in');
        burst(idx);
      }, 170);
    }

    function burst(idx){
      const wrap=document.getElementById('bw'+idx), col=ACC[idx], N=9;
      for(let i=0;i<N;i++){
        const p=document.createElement('div'); p.className='bp';
        const a=(i/N)*Math.PI*2+Math.random()*0.4;
        const d=16+Math.random()*30;
        p.style.cssText=`left:50%;top:45%;background:${col};box-shadow:0 0 5px ${col};--bx:${Math.cos(a)*d}px;--by:${Math.sin(a)*d}px;animation-duration:${0.4+Math.random()*0.2}s;`;
        wrap.appendChild(p); setTimeout(()=>p.remove(),700);
      }
    }

    function showArrival(){
      const sc=document.getElementById('arrival-screen'); sc.classList.add('active');
      const COLS=['#ff6b35','#b060ff','#3dd6f5','#3dffa0','#fbbf24','#f43f5e'];
      const cont=sc;
      for(let i=0;i<160;i++){
        const p=document.createElement('div'); p.className='confetti-piece';
        const delay=Math.random()*3.5, dur=2.5+Math.random()*3, size=5+Math.random()*13;
        const color=COLS[Math.floor(Math.random()*COLS.length)];
        p.style.cssText=`left:${Math.random()*100}vw;top:0;width:${size}px;height:${size*(0.4+Math.random()*1.3)}px;background:${color};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${dur}s;animation-delay:${delay}s;`;
        cont.appendChild(p); setTimeout(()=>p.remove(),(delay+dur)*1000+200);
      }
    }

    let pD=-1,pH=-1,pM=-1,pS=-1;
    function tick(){
      const now=new Date(), diff=TARGET-now;
      const p=Math.min(100,Math.max(0,((now-START)/(TARGET-START))*100));
      bar.style.width=p.toFixed(2)+'%'; pctEl.textContent=p.toFixed(1)+'%';

      if(diff<=0){ ['00','00','00','00'].forEach((v,i)=>flipEl([elD,elH,elM,elS][i],v,i)); showArrival(); return; }

      const tot=Math.floor(diff/1000);
      const s=tot%60, m=Math.floor(tot/60)%60, h=Math.floor(tot/3600)%24, d=Math.floor(tot/86400);
      if(d!==pD){flipEl(elD,pad(d),0);pD=d;}
      if(h!==pH){flipEl(elH,pad(h),1);pH=h;}
      if(m!==pM){flipEl(elM,pad(m),2);pM=m;}
      if(s!==pS){flipEl(elS,pad(s),3);pS=s;}
      setTimeout(tick,1000);
    }
    tick();
  })();
  </script>
</body>
