<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nos vamos de viaje ✈️</title>

  <!-- Google Fonts: Playfair Display (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* =============================================
       CSS CUSTOM PROPERTIES (DESIGN TOKENS)
    ============================================= */
    :root {
      --color-bg-from:   #0f0c29;
      --color-bg-mid:    #1a1050;
      --color-bg-to:     #24243e;

      --color-accent-1:  #f97316;   /* naranja cálido  */
      --color-accent-2:  #a855f7;   /* violeta vibrante */
      --color-accent-3:  #38bdf8;   /* celeste suave   */

      --color-text:      #f1f5f9;
      --color-muted:     rgba(241,245,249,0.55);

      --card-bg:         rgba(255,255,255,0.06);
      --card-border:     rgba(255,255,255,0.12);
      --card-shadow:     0 8px 40px rgba(0,0,0,0.45);

      --radius:          20px;
      --transition:      0.35s cubic-bezier(0.34,1.56,0.64,1);
    }

    /* =============================================
       RESET & BASE
    ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      color: var(--color-text);
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;

      /* fondo base (se sobreescribe con el canvas animado) */
      background: linear-gradient(135deg, var(--color-bg-from), var(--color-bg-mid), var(--color-bg-to));
    }

    /* =============================================
       CANVAS DE FONDO ANIMADO (partículas / estrellas)
    ============================================= */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* =============================================
       CONTENEDOR PRINCIPAL
    ============================================= */
    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 860px;
      text-align: center;
      animation: fadeInUp 1s ease both;
    }

    /* =============================================
       AVIÓN DECORATIVO SUPERIOR
    ============================================= */
    .plane-icon {
      font-size: clamp(3rem, 8vw, 5rem);
      display: inline-block;
      animation: flyIn 1.2s ease both, hover 3s ease-in-out 1.2s infinite;
      filter: drop-shadow(0 0 18px rgba(249,115,22,0.6));
    }

    @keyframes flyIn {
      from { transform: translateX(-120px) rotate(-15deg); opacity: 0; }
      to   { transform: translateX(0)     rotate(0deg);   opacity: 1; }
    }
    @keyframes hover {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    /* =============================================
       TÍTULO Y SUBTÍTULO
    ============================================= */
    .title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 7vw, 4rem);
      font-weight: 900;
      line-height: 1.15;
      margin-top: 0.5rem;

      /* degradado en el texto */
      background: linear-gradient(100deg, #f97316 0%, #a855f7 55%, #38bdf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;

      animation: fadeInUp 1s 0.3s ease both;
    }

    .subtitle {
      margin-top: 0.75rem;
      font-size: clamp(0.95rem, 2.5vw, 1.2rem);
      font-weight: 300;
      color: var(--color-muted);
      letter-spacing: 0.02em;
      animation: fadeInUp 1s 0.5s ease both;
    }

    /* =============================================
       LÍNEA DECORATIVA
    ============================================= */
    .divider {
      margin: 2rem auto;
      width: 80px;
      height: 3px;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--color-accent-1), var(--color-accent-2), var(--color-accent-3));
      animation: fadeInUp 1s 0.6s ease both;
    }

    /* =============================================
       GRID DE TARJETAS
    ============================================= */
    .countdown-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.25rem;
      margin-top: 2rem;
      animation: fadeInUp 1s 0.7s ease both;
    }

    @media (max-width: 580px) {
      .countdown-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
      }
    }

    /* =============================================
       TARJETA INDIVIDUAL
    ============================================= */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 1.75rem 1rem 1.5rem;
      box-shadow: var(--card-shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-6px) scale(1.03);
      box-shadow: 0 16px 50px rgba(0,0,0,0.55);
    }

    /* brillo sutil en la parte superior de cada tarjeta */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
    }

    /* color de acento distinto por tarjeta */
    .card:nth-child(1) { --card-accent: #f97316; }
    .card:nth-child(2) { --card-accent: #a855f7; }
    .card:nth-child(3) { --card-accent: #38bdf8; }
    .card:nth-child(4) { --card-accent: #34d399; }

    .card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: var(--card-accent);
      opacity: 0.8;
      border-radius: 0 0 var(--radius) var(--radius);
    }

    /* =============================================
       NÚMERO (dígito)
    ============================================= */
    .number {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: clamp(2.8rem, 7vw, 4.5rem);
      line-height: 1;
      color: #ffffff;
      /* sombra de color con el acento de la tarjeta */
      text-shadow: 0 0 28px color-mix(in srgb, var(--card-accent) 60%, transparent);
      display: block;
      /* clase .flip se añade por JS para la animación al cambiar */
      transition: transform var(--transition), opacity 0.25s ease;
    }

    /* Animación de cambio de dígito */
    .number.flip {
      animation: flipNum 0.4s ease both;
    }

    @keyframes flipNum {
      0%   { transform: scale(1.35) translateY(-8px); opacity: 0.4; }
      60%  { transform: scale(1.08) translateY(2px);  opacity: 1;   }
      100% { transform: scale(1)    translateY(0);    opacity: 1;   }
    }

    /* =============================================
       ETIQUETA (días / horas / etc.)
    ============================================= */
    .label {
      display: block;
      margin-top: 0.55rem;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--card-accent);
      opacity: 0.85;
    }

    /* =============================================
       EMOJI DE DESTINO
    ============================================= */
    .destination {
      margin-top: 2.5rem;
      font-size: clamp(1.4rem, 4vw, 2rem);
      letter-spacing: 0.25em;
      animation: fadeInUp 1s 0.9s ease both;
      opacity: 0.75;
    }

    /* =============================================
       FECHA OBJETIVO
    ============================================= */
    .target-date {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: var(--color-muted);
      letter-spacing: 0.08em;
      animation: fadeInUp 1s 1s ease both;
    }

    /* =============================================
       PANTALLA DE "¡LLEGÓ EL DÍA!"
    ============================================= */
    #arrival-screen {
      display: none;           /* oculta por defecto */
      position: fixed;
      inset: 0;
      z-index: 100;
      background: radial-gradient(ellipse at center, #1a0533 0%, #0f0c29 70%);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 2rem;
    }

    #arrival-screen.active {
      display: flex;
      animation: fadeIn 1.2s ease both;
    }

    .arrival-emoji {
      font-size: 5rem;
      animation: pop 0.8s 0.4s cubic-bezier(0.34,1.56,0.64,1) both, hover 2.5s 1.2s ease-in-out infinite;
    }

    .arrival-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 900;
      margin-top: 1.5rem;
      background: linear-gradient(100deg, #f97316, #a855f7, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeInUp 1s 0.6s ease both;
    }

    .arrival-sub {
      margin-top: 1rem;
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: var(--color-muted);
      animation: fadeInUp 1s 0.9s ease both;
    }

    /* confeti */
    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      opacity: 0;
      animation: confettiFall linear forwards;
    }

    /* =============================================
       UTILIDADES DE ANIMACIÓN
    ============================================= */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes pop {
      from { transform: scale(0);   opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    @keyframes confettiFall {
      0%   { transform: translateY(-40px) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

  </style>
</head>

<body>

  <!-- =========================================
       CANVAS DE FONDO (partículas / estrellas)
  ========================================= -->
  <canvas id="bg-canvas"></canvas>

  <!-- =========================================
       PANTALLA PRINCIPAL
  ========================================= -->
  <div class="wrapper" role="main">

    <!-- Ícono avión -->
    <div class="plane-icon" aria-hidden="true">✈️</div>

    <!-- Título -->
    <h1 class="title">Nos vamos de viaje ✈️</h1>

    <!-- Subtítulo -->
    <p class="subtitle">Falta muy poco para nuestra aventura en familia ❤️</p>

    <!-- Línea decorativa -->
    <div class="divider" aria-hidden="true"></div>

    <!-- Grid de countdown -->
    <div class="countdown-grid" aria-live="polite" aria-label="Cuenta regresiva">

      <div class="card" aria-label="Días">
        <span class="number" id="days">00</span>
        <span class="label">Días</span>
      </div>

      <div class="card" aria-label="Horas">
        <span class="number" id="hours">00</span>
        <span class="label">Horas</span>
      </div>

      <div class="card" aria-label="Minutos">
        <span class="number" id="minutes">00</span>
        <span class="label">Minutos</span>
      </div>

      <div class="card" aria-label="Segundos">
        <span class="number" id="seconds">00</span>
        <span class="label">Segundos</span>
      </div>

    </div><!-- /.countdown-grid -->

    <!-- Emojis decorativos de destino -->
    <div class="destination" aria-hidden="true">🌍 🗺️ 🧳 🌅 📸</div>

    <!-- Fecha objetivo -->
    <p class="target-date">7 de abril de 2026 a las 7:00 hs · ¡Despegamos!</p>

  </div><!-- /.wrapper -->

  <!-- =========================================
       PANTALLA DE LLEGADA (día cero)
  ========================================= -->
  <div id="arrival-screen" role="alert" aria-live="assertive">
    <div class="arrival-emoji">🎉</div>
    <h2 class="arrival-title">¡Llegó el día!</h2>
    <p class="arrival-sub">Es hora de vivir esa aventura en familia que tanto esperaron 🌍❤️✈️</p>
  </div>


  <!-- =========================================
       JAVASCRIPT
  ========================================= -->
  <script>
    /* --------------------------------------------------
       1. CANVAS ANIMADO: CAMPO DE ESTRELLAS
    -------------------------------------------------- */
    (function () {
      const canvas = document.getElementById('bg-canvas');
      const ctx    = canvas.getContext('2d');

      // Ajustar tamaño al viewport
      function resize () {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      // Crear estrellas
      const STAR_COUNT = 160;
      const stars = Array.from({ length: STAR_COUNT }, () => ({
        x:    Math.random() * canvas.width,
        y:    Math.random() * canvas.height,
        r:    Math.random() * 1.6 + 0.3,
        a:    Math.random(),            // opacidad actual
        da:   (Math.random() - 0.5) * 0.008, // delta opacidad
        vx:   (Math.random() - 0.5) * 0.15,  // velocidad x
        vy:   (Math.random() - 0.5) * 0.15,  // velocidad y
      }));

      // Paleta de colores de las estrellas
      const COLORS = ['#f97316', '#a855f7', '#38bdf8', '#ffffff', '#e2e8f0'];

      function draw () {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Fondo degradado
        const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        grad.addColorStop(0,   '#0f0c29');
        grad.addColorStop(0.5, '#1a1050');
        grad.addColorStop(1,   '#24243e');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Dibujar cada estrella
        stars.forEach((s, i) => {
          s.a += s.da;
          if (s.a <= 0 || s.a >= 1) s.da = -s.da; // parpadeo
          s.x += s.vx;
          s.y += s.vy;
          // wrap-around
          if (s.x < 0)             s.x = canvas.width;
          if (s.x > canvas.width)  s.x = 0;
          if (s.y < 0)             s.y = canvas.height;
          if (s.y > canvas.height) s.y = 0;

          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = COLORS[i % COLORS.length];
          ctx.globalAlpha = Math.max(0.1, Math.abs(s.a));
          ctx.fill();
        });

        ctx.globalAlpha = 1;
        requestAnimationFrame(draw);
      }

      draw();
    })();


    /* --------------------------------------------------
       2. COUNTDOWN TIMER
    -------------------------------------------------- */
    (function () {
      // Fecha objetivo: 7 de abril de 2026 a las 00:00 hs (hora local)
      const TARGET = new Date('2026-04-07T07:00:00');

      // Referencias a los elementos del DOM
      const elDays    = document.getElementById('days');
      const elHours   = document.getElementById('hours');
      const elMinutes = document.getElementById('minutes');
      const elSeconds = document.getElementById('seconds');

      // Valores previos para detectar cambios (y lanzar animación)
      let prev = { d: -1, h: -1, m: -1, s: -1 };

      /**
       * Formatea un número con cero a la izquierda si es < 10
       * @param {number} n
       * @returns {string}
       */
      function pad (n) {
        return String(n).padStart(2, '0');
      }

      /**
       * Actualiza el texto de un elemento y lanza la animación "flip"
       * si el valor cambió respecto al tick anterior.
       * @param {HTMLElement} el
       * @param {string} value   - texto nuevo (ej. "07")
       * @param {string} prevKey - clave en 'prev' para comparar
       */
      function updateEl (el, value, prevKey) {
        if (el.textContent !== value) {
          el.textContent = value;
          // Relanzar animación: quitar y agregar clase
          el.classList.remove('flip');
          // Forzar reflow para reiniciar la animación CSS
          void el.offsetWidth;
          el.classList.add('flip');
        }
      }

      /**
       * Muestra la pantalla de "¡Llegó el día!" con confeti
       */
      function showArrival () {
        const screen = document.getElementById('arrival-screen');
        screen.classList.add('active');
        launchConfetti();
      }

      /**
       * Lanza 120 piezas de confeti animadas
       */
      function launchConfetti () {
        const COLORS = ['#f97316', '#a855f7', '#38bdf8', '#34d399', '#fbbf24', '#f43f5e'];
        const container = document.getElementById('arrival-screen');

        for (let i = 0; i < 120; i++) {
          const piece = document.createElement('div');
          piece.className = 'confetti-piece';

          // Posición y propiedades aleatorias
          const x        = Math.random() * 100;
          const delay    = Math.random() * 3;
          const duration = 2.5 + Math.random() * 2.5;
          const size     = 6 + Math.random() * 10;
          const color    = COLORS[Math.floor(Math.random() * COLORS.length)];
          const shape    = Math.random() > 0.5 ? '50%' : '2px'; // círculo o rectángulo

          piece.style.cssText = `
            left:${x}vw;
            top:0;
            width:${size}px;
            height:${size}px;
            background:${color};
            border-radius:${shape};
            animation-duration:${duration}s;
            animation-delay:${delay}s;
          `;

          container.appendChild(piece);

          // Limpiar después de la animación
          setTimeout(() => piece.remove(), (delay + duration) * 1000 + 100);
        }
      }

      /**
       * Función principal: calcula el tiempo restante y actualiza la UI.
       * Se llama cada segundo.
       */
      function tick () {
        const now  = new Date();
        const diff = TARGET - now; // diferencia en ms

        // Si ya llegó el día
        if (diff <= 0) {
          updateEl(elDays,    '00', 'd');
          updateEl(elHours,   '00', 'h');
          updateEl(elMinutes, '00', 'm');
          updateEl(elSeconds, '00', 's');
          showArrival();
          return; // detener el timer
        }

        // Calcular unidades
        const totalSec = Math.floor(diff / 1000);
        const s = totalSec % 60;
        const m = Math.floor(totalSec / 60) % 60;
        const h = Math.floor(totalSec / 3600) % 24;
        const d = Math.floor(totalSec / 86400);

        // Actualizar DOM con animación si cambió
        updateEl(elDays,    pad(d), 'd');
        updateEl(elHours,   pad(h), 'h');
        updateEl(elMinutes, pad(m), 'm');
        updateEl(elSeconds, pad(s), 's');

        // Guardar para el próximo tick
        prev = { d, h, m, s };

        // Programar el próximo tick en 1 segundo
        setTimeout(tick, 1000);
      }

      // Arrancar el timer
      tick();

    })();
  </script>

</body>
</html>
